# DataId: supplychain-logistics.yml
# Group: SUPPLYCHAIN_GROUP
# Namespace: 11b2def2-6737-44ad-be78-e3dc686a02ec
# 说明：物流管理服务远程扩展配置。
server:
  port: 9208

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:supplychain_dev}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: 123456

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

xxl-job:
  admin:
    addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8080/xxl-job-admin}
  executor:
    appname: supplychain-logistics
    address:
    ip:
    port: ${XXL_JOB_LOGISTICS_PORT:9998}
    logpath: logs/xxl-job/logistics
    logretentiondays: 30
  accessToken: ${XXL_JOB_ACCESS_TOKEN:}

supplychain:
  logistics:
    webhook-secret: ${TMS_WEBHOOK_SECRET:dev-secret}
    waybill-lock-ttl: 30s
    track-pull:
      batch-size: 200
      carrier-concurrency: 4
      task-timeout: 10s

