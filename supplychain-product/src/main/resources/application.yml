spring:
  application:
    name: supplychain-product
  config:
    import:
      - optional:nacos:supplychain-common.yml?group=SUPPLYCHAIN_GROUP
      - optional:nacos:supplychain-product.yml?group=SUPPLYCHAIN_GROUP
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:11b2def2-6737-44ad-be78-e3dc686a02ec}
        group: SUPPLYCHAIN_GROUP
      config:
        namespace: ${NACOS_NAMESPACE:11b2def2-6737-44ad-be78-e3dc686a02ec}
        group: SUPPLYCHAIN_GROUP
        file-extension: yml
